name: Backend CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-24.04
    defaults: {run: {working-directory: backend}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quitnic
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: quitnic
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U quitnic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e '.[dev]'
      - run: ruff check app tests
      - run: mypy app
      - name: Tests against SQLite
        run: pytest -q
      - name: Migrations against PostgreSQL
        run: alembic upgrade head && alembic downgrade base && alembic upgrade head
        env: {DATABASE_URL: "postgresql+asyncpg://quitnic:ci-password@localhost:5432/quitnic"}
      - name: Tests against PostgreSQL
        run: pytest -q
        env: {DATABASE_URL: "postgresql+asyncpg://quitnic:ci-password@localhost:5432/quitnic"}
  container:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: {context: backend, push: false, tags: "quitnic-api:${{ github.sha }}"}
