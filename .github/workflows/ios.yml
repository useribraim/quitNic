name: iOS CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: {xcode-version: "16.0"}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e '.[dev]'
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
      - name: Start local API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/quitnic-api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/quitnic-api.pid"
        working-directory: backend
      - name: Wait for local API
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/quitnic-api.log"
          exit 1
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: ios
      - run: xcodebuild test -project QuitNic.xcodeproj -scheme QuitNic -destination 'platform=iOS Simulator,name=iPhone 16'
        working-directory: ios
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quitnic-api-log
          path: ${{ runner.temp }}/quitnic-api.log
