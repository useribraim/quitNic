name: iOS CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: {xcode-version: "16.0"}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e '.[dev]'
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
      - name: Start local API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/quitnic-api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/quitnic-api.pid"
        working-directory: backend
      - name: Wait for local API
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/quitnic-api.log"
          exit 1
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: ios
      - name: Select an available iOS Simulator
        id: simulator
        run: |
          set -euo pipefail
          runtime_id="$(xcrun simctl list runtimes available | sed -nE 's/.* - (com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+)( \(.*\))?$/\1/p' | head -n 1)"
          if [[ -z "$runtime_id" ]]; then
            echo "No available iOS Simulator runtime was installed on this runner."
            xcrun simctl list runtimes
            exit 1
          fi

          device_id="$(xcrun simctl list devices available | sed -nE 's/.*iPhone 16.*\(([A-F0-9-]+)\).*/\1/p' | head -n 1)"
          if [[ -z "$device_id" ]]; then
            device_id="$(xcrun simctl create QuitNic-iPhone-16 com.apple.CoreSimulator.SimDeviceType.iPhone-16 "$runtime_id")"
          fi

          echo "Using simulator $device_id on runtime $runtime_id"
          xcrun simctl boot "$device_id" 2>/dev/null || true
          xcrun simctl bootstatus "$device_id" -b
          xcrun simctl list devices available
          echo "destination=platform=iOS Simulator,id=$device_id" >> "$GITHUB_OUTPUT"
      - name: Run iOS tests
        run: |
          set -o pipefail
          xcodebuild -showdestinations -project QuitNic.xcodeproj -scheme QuitNic
          xcodebuild test -project QuitNic.xcodeproj -scheme QuitNic -destination '${{ steps.simulator.outputs.destination }}' 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"
        working-directory: ios
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quitnic-api-log
          path: ${{ runner.temp }}/quitnic-api.log
      - name: Upload Xcode log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quitnic-xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
