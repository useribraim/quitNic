name: QuitNic
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  QuitNic:
    type: application
    platform: iOS
    sources: [QuitNic]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.QuitNic
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          QUITNIC_API_URL: http://localhost:8000
        Release:
          QUITNIC_API_URL: https://replace-with-app-runner-url.example
    info:
      path: QuitNic/Info.plist
      properties:
        CFBundleDisplayName: QuitNic
        QuitNicAPIURL: $(QUITNIC_API_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
    scheme:
      testTargets: [QuitNicTests, QuitNicUITests]
  QuitNicTests:
    type: bundle.unit-test
    platform: iOS
    sources: [QuitNicTests]
    dependencies: [{target: QuitNic}]
    settings: {base: {GENERATE_INFOPLIST_FILE: YES}}
  QuitNicUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [QuitNicUITests]
    dependencies: [{target: QuitNic}]
    settings: {base: {GENERATE_INFOPLIST_FILE: YES}}
